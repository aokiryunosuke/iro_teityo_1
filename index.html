<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>いろ・啼鳥 第一号</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255, 255, 255, 0.68);
      --panel: rgba(0, 0, 0, 0.62);
      --line: rgba(255, 255, 255, 0.22);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    #viewer {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #spread {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: hidden;
    }

    .page {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
      box-shadow: none;
    }

    .page.empty {
      width: 0 !important;
      height: 0 !important;
      background: transparent;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    #controls {
      position: fixed;
      left: 50%;
      bottom: calc(8px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      color: #fff;
      max-width: calc(100vw - 12px);
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 999px;
      height: 34px;
      min-width: 34px;
      padding: 0 10px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.25;
      cursor: default;
    }

    #pageInfo {
      min-width: 78px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .tap-zone {
      position: fixed;
      top: 0;
      bottom: 0;
      z-index: 10;
      width: 32vw;
      border: 0;
      background: transparent;
      padding: 0;
      opacity: 0;
    }

    /*
      日本語の右開き本として：
      左側タップ = 次へ
      右側タップ = 前へ
    */
    #nextZone {
      left: 0;
    }

    #prevZone {
      right: 0;
    }

    #status {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      line-height: 1.8;
      text-align: center;
      background: #000;
      z-index: 30;
    }

    #status.error {
      color: #ffd1d1;
    }

    @media (max-width: 820px) {
      #controls {
        bottom: calc(6px + env(safe-area-inset-bottom));
        gap: 4px;
        padding: 4px;
      }

      button {
        height: 31px;
        min-width: 31px;
        padding: 0 8px;
        font-size: 12px;
      }

      #pageInfo {
        min-width: 68px;
        font-size: 12px;
      }
    }

    @media (max-width: 420px) {
      #zoomOutBtn,
      #zoomInBtn {
        display: none;
      }

      #controls {
        gap: 3px;
      }

      button {
        min-width: 30px;
        height: 30px;
        padding: 0 7px;
      }
    }
  </style>
</head>

<body>
  <div id="viewer" aria-label="PDF viewer">
    <div id="spread">
      <div class="page" id="leftPage"></div>
      <div class="page" id="rightPage"></div>
    </div>
  </div>

  <button class="tap-zone" id="nextZone" aria-label="次へ"></button>
  <button class="tap-zone" id="prevZone" aria-label="前へ"></button>

  <div id="controls">
    <button id="nextBtn" aria-label="次へ">←</button>
    <span id="pageInfo">...</span>
    <button id="prevBtn" aria-label="前へ">→</button>
    <button id="zoomOutBtn" aria-label="縮小">−</button>
    <button id="zoomResetBtn" aria-label="ズームを戻す">100%</button>
    <button id="zoomInBtn" aria-label="拡大">＋</button>
  </div>

  <div id="status">読み込み中...</div>

  <script>
    /*
      GitHub上で以下のように置いてください。

      iro_teityo_1/
      ├── index.html
      ├── issue01.pdf
      └── README.md

      issue01.pdf は index.html と同じ階層です。
    */
    const PDF_URL = './issue01.pdf';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const statusEl = document.getElementById('status');
    const viewerEl = document.getElementById('viewer');
    const leftPageEl = document.getElementById('leftPage');
    const rightPageEl = document.getElementById('rightPage');
    const pageInfoEl = document.getElementById('pageInfo');

    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextZone = document.getElementById('nextZone');
    const prevZone = document.getElementById('prevZone');

    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomResetBtn = document.getElementById('zoomResetBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');

    let pdfDoc = null;
    let totalPages = 0;

    /*
      currentPage は見開きの基準ページです。

      1      → 1ページ目単独、右側に表示
      2      → 3-2
      4      → 5-4
      6      → 7-6
      ...
      100    → 100ページ目単独、左側に表示
    */
    let currentPage = 1;

    /*
      片ページモードは使いません。
      スマホでもPCでも常に見開きです。
    */
    let zoom = window.innerWidth <= 900 ? 1.04 : 1;

    let rendering = false;
    let rerenderQueued = false;
    let currentRenderTask = null;

    function clamp(number, min, max) {
      return Math.max(min, Math.min(max, number));
    }

    function normalizePage(page) {
      page = clamp(page, 1, totalPages);

      if (page === 1) {
        return 1;
      }

      /*
        2ページ以降は偶数ページを見開きの基準にする。
        2 → 3-2
        4 → 5-4
      */
      return page % 2 === 0 ? page : page - 1;
    }

    function visiblePages() {
      if (currentPage === 1) {
        return [1];
      }

      if (currentPage + 1 <= totalPages) {
        /*
          表示順を右開き本に合わせる。
          左ページ、右ページの順で返す。

          currentPage = 2 → [3, 2]
          currentPage = 4 → [5, 4]
        */
        return [currentPage + 1, currentPage];
      }

      /*
        最終ページが単独になる場合。
        今回は100ページなので、100ページ目は単独で左側。
      */
      return [currentPage];
    }

    function lastStartPage() {
      if (totalPages <= 1) {
        return 1;
      }

      /*
        100ページのような偶数ページ数の場合、最後は100単独。
        99ページのような奇数ページ数の場合、最後の見開きは99-98。
      */
      return totalPages % 2 === 0 ? totalPages : totalPages - 1;
    }

    function updateUi() {
      const pages = visiblePages();

      if (pages.length === 1) {
        pageInfoEl.textContent = `${pages[0]}/${totalPages}`;
      } else {
        pageInfoEl.textContent = `${pages[0]}-${pages[1]}/${totalPages}`;
      }

      const isLast = currentPage >= lastStartPage();
      const isFirst = currentPage <= 1;

      nextBtn.disabled = isLast;
      nextZone.disabled = isLast;

      prevBtn.disabled = isFirst;
      prevZone.disabled = isFirst;

      zoomResetBtn.textContent = `${Math.round(zoom * 100)}%`;
    }

    function clearPage(element) {
      element.innerHTML = '';
      element.classList.add('empty');
      element.style.width = '0px';
      element.style.height = '0px';
    }

    function getDeviceScale() {
      const dpr = window.devicePixelRatio || 1;

      /*
        スマホで落ちにくくしつつ、5MB版PDFでもなるべく読めるようにする。
        重い場合は 1.6 → 1.4 に下げる。
        もっと画質が欲しい場合は 1.6 → 1.8 に上げる。
      */
      if (window.innerWidth <= 900) {
        return Math.min(dpr, 1.6);
      }

      return Math.min(dpr, 2);
    }

    async function drawPage(pageNumber, element, maxWidth, maxHeight) {
      element.innerHTML = '';
      element.classList.remove('empty');

      const page = await pdfDoc.getPage(pageNumber);
      const baseViewport = page.getViewport({ scale: 1 });

      /*
        PDF元ページの比率を保ったまま、画面内に最大表示。
      */
      const fitScale = Math.min(
        maxWidth / baseViewport.width,
        maxHeight / baseViewport.height
      );

      const viewport = page.getViewport({
        scale: fitScale * zoom
      });

      const dpr = getDeviceScale();

      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { alpha: false });

      canvas.width = Math.floor(viewport.width * dpr);
      canvas.height = Math.floor(viewport.height * dpr);

      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      element.style.width = `${Math.floor(viewport.width)}px`;
      element.style.height = `${Math.floor(viewport.height)}px`;

      context.setTransform(dpr, 0, 0, dpr, 0, 0);
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = 'high';

      element.appendChild(canvas);

      const renderTask = page.render({
        canvasContext: context,
        viewport
      });

      currentRenderTask = renderTask;

      await renderTask.promise;

      if (currentRenderTask === renderTask) {
        currentRenderTask = null;
      }
    }

    async function render() {
      if (!pdfDoc) {
        return;
      }

      if (rendering) {
        rerenderQueued = true;
        return;
      }

      rendering = true;
      rerenderQueued = false;

      currentPage = normalizePage(currentPage);
      updateUi();

      const pages = visiblePages();

      const viewerWidth = viewerEl.clientWidth;
      const viewerHeight = viewerEl.clientHeight;

      /*
        下の操作バーのぶんだけ少し高さを空ける。
        ページをなるべく大きく見せたいので、控えめにする。
      */
      const controlSpace = window.innerWidth <= 900 ? 38 : 48;
      const maxHeight = Math.max(160, viewerHeight - controlSpace);

      try {
        if (pages.length === 1) {
          /*
            単独ページも、見開き中の1ページと同じ大きさにする。
            つまり全幅ではなく、画面の半分幅を上限にする。
          */
          const singlePageWidth = viewerWidth / 2;

          if (pages[0] === 1) {
            /*
              1ページ目は右側に置く。
            */
            clearPage(leftPageEl);
            await drawPage(pages[0], rightPageEl, singlePageWidth, maxHeight);
          } else {
            /*
              100ページ目など、最後の単独ページは左側に置く。
            */
            await drawPage(pages[0], leftPageEl, singlePageWidth, maxHeight);
            clearPage(rightPageEl);
          }
        } else {
          /*
            見開き。
            pages は [3,2], [5,4] のように
            左ページ、右ページの順。
          */
          const maxPageWidth = viewerWidth / 2;

          await drawPage(pages[0], leftPageEl, maxPageWidth, maxHeight);
          await drawPage(pages[1], rightPageEl, maxPageWidth, maxHeight);
        }

        statusEl.style.display = 'none';
      } catch (error) {
        if (String(error?.name) !== 'RenderingCancelledException') {
          showError(error);
        }
      }

      rendering = false;

      if (rerenderQueued) {
        render();
      }
    }

    function next() {
      if (currentPage >= lastStartPage()) {
        return;
      }

      if (currentPage === 1) {
        currentPage = 2;
      } else {
        currentPage += 2;
      }

      render();
    }

    function prev() {
      if (currentPage <= 1) {
        return;
      }

      if (currentPage <= 2) {
        currentPage = 1;
      } else {
        currentPage -= 2;
      }

      render();
    }

    function setZoom(value) {
      zoom = clamp(value, 0.7, 2.4);
      render();
    }

    function showError(error) {
      statusEl.style.display = 'grid';
      statusEl.className = 'error';
      statusEl.innerHTML =
        `PDFを読み込めませんでした。<br>` +
        `index.html と同じ場所に issue01.pdf があるか確認してください。<br><br>` +
        `${String(error.message || error)}`;
    }

    nextBtn.addEventListener('click', next);
    nextZone.addEventListener('click', next);

    prevBtn.addEventListener('click', prev);
    prevZone.addEventListener('click', prev);

    zoomOutBtn.addEventListener('click', () => {
      setZoom(zoom - 0.1);
    });

    zoomInBtn.addEventListener('click', () => {
      setZoom(zoom + 0.1);
    });

    zoomResetBtn.addEventListener('click', () => {
      zoom = window.innerWidth <= 900 ? 1.04 : 1;
      render();
    });

    /*
      キーボード操作：
      日本語の右開き本なので、← で次へ、→ で前へ。
    */
    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') {
        next();
      }

      if (event.key === 'ArrowRight') {
        prev();
      }
    });

    /*
      スマホ操作：
      左へスワイプ = 次へ
      右へスワイプ = 前へ
    */
    let touchStartX = 0;
    let touchStartY = 0;

    window.addEventListener('touchstart', (event) => {
      touchStartX = event.changedTouches[0].clientX;
      touchStartY = event.changedTouches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', (event) => {
      const diffX = event.changedTouches[0].clientX - touchStartX;
      const diffY = event.changedTouches[0].clientY - touchStartY;

      if (Math.abs(diffX) < 45) {
        return;
      }

      if (Math.abs(diffY) > 90) {
        return;
      }

      if (diffX < 0) {
        next();
      } else {
        prev();
      }
    }, { passive: true });

    let resizeTimer = null;

    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(() => {
        render();
      }, 150);
    });

    async function init() {
      try {
        const loadingTask = pdfjsLib.getDocument({
          url: PDF_URL,
          disableAutoFetch: false,
          disableStream: false,
          disableRange: false
        });

        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;
        currentPage = 1;

        render();
      } catch (error) {
        showError(error);
      }
    }

    init();
  </script>
</body>
</html>
