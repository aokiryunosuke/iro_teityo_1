<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>いろ・啼鳥 第一号</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255, 255, 255, 0.72);
      --panel: rgba(0, 0, 0, 0.60);
      --line: rgba(255, 255, 255, 0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    #viewer {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #spread {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: hidden;
    }

    .page {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
      box-shadow: none;
    }

    .page.empty {
      width: 0 !important;
      height: 0 !important;
      background: transparent;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    #controls {
      position: fixed;
      left: 50%;
      bottom: calc(8px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      color: #fff;
      max-width: calc(100vw - 12px);
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 999px;
      height: 34px;
      min-width: 34px;
      padding: 0 10px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
    }

    button:disabled {
      opacity: .25;
      cursor: default;
    }

    #pageInfo {
      min-width: 78px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .tap-zone {
      position: fixed;
      top: 0;
      bottom: 0;
      z-index: 10;
      width: 32vw;
      border: 0;
      background: transparent;
      padding: 0;
      opacity: 0;
    }

    /*
      左側タップ = 次へ
      右側タップ = 前へ
    */
    #nextZone { left: 0; }
    #prevZone { right: 0; }

    #status {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      line-height: 1.8;
      text-align: center;
      background: #000;
      z-index: 30;
    }

    #status.error {
      color: #ffd1d1;
    }

    #rotateNotice {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
      padding: 24px;
      text-align: center;
    }

    #rotateNotice .inner {
      max-width: 320px;
      line-height: 1.9;
      color: #fff;
    }

    #rotateNotice .title {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    #rotateNotice .sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    @media (max-width: 900px) and (orientation: portrait) {
      #rotateNotice {
        display: flex;
      }
    }

    @media (max-width: 820px) {
      #controls {
        bottom: calc(6px + env(safe-area-inset-bottom));
        gap: 4px;
        padding: 4px;
      }

      button {
        height: 31px;
        min-width: 31px;
        padding: 0 8px;
        font-size: 12px;
      }

      #pageInfo {
        min-width: 68px;
        font-size: 12px;
      }
    }

    @media (max-width: 420px) {
      #zoomOutBtn,
      #zoomInBtn {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="viewer" aria-label="PDF viewer">
    <div id="spread">
      <div class="page" id="leftPage"></div>
      <div class="page" id="rightPage"></div>
    </div>
  </div>

  <button class="tap-zone" id="nextZone" aria-label="次へ"></button>
  <button class="tap-zone" id="prevZone" aria-label="前へ"></button>

  <div id="controls">
    <button id="nextBtn" aria-label="次へ">←</button>
    <span id="pageInfo">...</span>
    <button id="prevBtn" aria-label="前へ">→</button>
    <button id="zoomOutBtn">−</button>
    <button id="zoomResetBtn">100%</button>
    <button id="zoomInBtn">＋</button>
    <button id="fullscreenBtn">全</button>
  </div>

  <div id="status">読み込み中...</div>

  <div id="rotateNotice">
    <div class="inner">
      <div class="title">横向きでご覧ください</div>
      <div class="sub">
        スマホでは見開き表示にしています。<br>
        端末を横向きにすると読みやすくなります。
      </div>
      <button id="rotateButton">横向き表示を試す</button>
    </div>
  </div>

  <script>
    const PDF_URL = './issue01.pdf';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const statusEl = document.getElementById('status');
    const viewerEl = document.getElementById('viewer');
    const leftPageEl = document.getElementById('leftPage');
    const rightPageEl = document.getElementById('rightPage');
    const pageInfoEl = document.getElementById('pageInfo');

    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextZone = document.getElementById('nextZone');
    const prevZone = document.getElementById('prevZone');

    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomResetBtn = document.getElementById('zoomResetBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    const rotateButton = document.getElementById('rotateButton');

    let pdfDoc = null;
    let totalPages = 0;
    let currentPage = 1;

    /*
      片ページモードは廃止。
      常に見開き前提。
    */
    const singleMode = false;

    let zoom = window.innerWidth <= 900 ? 1.08 : 1;
    let rendering = false;
    let rerenderQueued = false;
    let currentRenderTask = null;

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function normalizePage(page) {
      page = clamp(page, 1, totalPages);

      if (page === 1) {
        return 1;
      }

      /*
        見開きの基準は偶数ページ
        2 → 3-2
        4 → 5-4
      */
      return page % 2 === 0 ? page : page - 1;
    }

    function visiblePages() {
      if (currentPage === 1) {
        return [1];
      }

      if (currentPage + 1 <= totalPages) {
        /*
          左右の並びを 3-2, 5-4 にする
        */
        return [currentPage + 1, currentPage];
      }

      return [currentPage];
    }

    function lastStartPage() {
      if (totalPages <= 1) {
        return 1;
      }
      return totalPages % 2 === 0 ? totalPages : totalPages - 1;
    }

    function updateUi() {
      const pages = visiblePages();

      if (pages.length === 1) {
        pageInfoEl.textContent = `${pages[0]}/${totalPages}`;
      } else {
        pageInfoEl.textContent = `${pages[0]}-${pages[1]}/${totalPages}`;
      }

      nextBtn.disabled = currentPage >= lastStartPage();
      prevBtn.disabled = currentPage <= 1;
      nextZone.disabled = nextBtn.disabled;
      prevZone.disabled = prevBtn.disabled;

      zoomResetBtn.textContent = `${Math.round(zoom * 100)}%`;
    }

    function clearPage(el) {
      el.innerHTML = '';
      el.classList.add('empty');
      el.style.width = '0px';
      el.style.height = '0px';
    }

    function getDeviceScale() {
      const dpr = window.devicePixelRatio || 1;

      /*
        前より少し画質を上げる
        ただしスマホで落ちにくいよう上限は抑える
      */
      if (window.innerWidth <= 900) {
        return Math.min(dpr, 1.8);
      }

      return Math.min(dpr, 2);
    }

    async function drawPage(pageNumber, el, maxWidth, maxHeight) {
      el.innerHTML = '';
      el.classList.remove('empty');

      const page = await pdfDoc.getPage(pageNumber);
      const baseViewport = page.getViewport({ scale: 1 });

      const fitScale = Math.min(
        maxWidth / baseViewport.width,
        maxHeight / baseViewport.height
      );

      const viewport = page.getViewport({ scale: fitScale * zoom });

      const dpr = getDeviceScale();
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { alpha: false });

      canvas.width = Math.floor(viewport.width * dpr);
      canvas.height = Math.floor(viewport.height * dpr);

      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      el.style.width = `${Math.floor(viewport.width)}px`;
      el.style.height = `${Math.floor(viewport.height)}px`;

      context.setTransform(dpr, 0, 0, dpr, 0, 0);
      context.imageSmoothingEnabled = true;

      el.appendChild(canvas);

      const renderTask = page.render({
        canvasContext: context,
        viewport
      });

      currentRenderTask = renderTask;
      await renderTask.promise;

      if (currentRenderTask === renderTask) {
        currentRenderTask = null;
      }
    }

    async function render() {
      if (!pdfDoc) return;

      if (rendering) {
        rerenderQueued = true;
        return;
      }

      rendering = true;
      rerenderQueued = false;

      currentPage = normalizePage(currentPage);
      updateUi();

      const pages = visiblePages();
      const vw = viewerEl.clientWidth;
      const vh = viewerEl.clientHeight;

      const controlSpace = window.innerWidth <= 900 ? 42 : 50;
      const maxHeight = Math.max(160, vh - controlSpace);

      try {
        if (pages.length === 1) {
          const singlePageWidth = vw / 2;

          /*
            1ページ目は右側
            最終ページは左側
          */
          if (pages[0] === 1) {
            clearPage(leftPageEl);
            await drawPage(pages[0], rightPageEl, singlePageWidth, maxHeight);
          } else {
            await drawPage(pages[0], leftPageEl, singlePageWidth, maxHeight);
            clearPage(rightPageEl);
          }
        } else {
          const maxWidth = vw / 2;

          /*
            pages = [3,2] のような順なので
            左に3、右に2
          */
          await drawPage(pages[0], leftPageEl, maxWidth, maxHeight);
          await drawPage(pages[1], rightPageEl, maxWidth, maxHeight);
        }

        statusEl.style.display = 'none';
      } catch (error) {
        if (String(error?.name) !== 'RenderingCancelledException') {
          showError(error);
        }
      }

      rendering = false;

      if (rerenderQueued) {
        render();
      }
    }

    function next() {
      if (currentPage >= lastStartPage()) return;
      currentPage = currentPage === 1 ? 2 : currentPage + 2;
      render();
    }

    function prev() {
      if (currentPage <= 1) return;
      currentPage = currentPage <= 2 ? 1 : currentPage - 2;
      render();
    }

    function setZoom(value) {
      zoom = clamp(value, 0.7, 2.4);
      render();
    }

    function showError(error) {
      statusEl.style.display = 'grid';
      statusEl.className = 'error';
      statusEl.innerHTML =
        `PDFを読み込めませんでした。<br>` +
        `index.html と同じ場所に issue01.pdf があるか確認してください。<br><br>` +
        `${String(error.message || error)}`;
    }

    async function enterFullscreenAndLandscape() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen?.();
        }
      } catch (e) {}

      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape');
        }
      } catch (e) {}
    }

    nextBtn.addEventListener('click', next);
    nextZone.addEventListener('click', next);

    prevBtn.addEventListener('click', prev);
    prevZone.addEventListener('click', prev);

    zoomOutBtn.addEventListener('click', () => setZoom(zoom - 0.1));
    zoomInBtn.addEventListener('click', () => setZoom(zoom + 0.1));
    zoomResetBtn.addEventListener('click', () => setZoom(window.innerWidth <= 900 ? 1.08 : 1));

    fullscreenBtn.addEventListener('click', enterFullscreenAndLandscape);
    rotateButton.addEventListener('click', enterFullscreenAndLandscape);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') next();
      if (e.key === 'ArrowRight') prev();
    });

    let startX = 0;
    let startY = 0;

    window.addEventListener('touchstart', (e) => {
      startX = e.changedTouches[0].clientX;
      startY = e.changedTouches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;

      if (Math.abs(dx) < 45 || Math.abs(dy) > 90) return;

      if (dx < 0) {
        next();
      } else {
        prev();
      }
    }, { passive: true });

    let resizeTimer = null;

    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        render();
      }, 160);
    });

    async function init() {
      try {
        const loadingTask = pdfjsLib.getDocument({
          url: PDF_URL,
          disableAutoFetch: false,
          disableStream: false,
          disableRange: false
        });

        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;
        currentPage = 1;

        render();

        /*
          対応ブラウザでは横向きロックを試す
        */
        if (window.innerWidth <= 900) {
          setTimeout(() => {
            enterFullscreenAndLandscape();
          }, 300);
        }
      } catch (error) {
        showError(error);
      }
    }

    init();
  </script>
</body>
</html>
