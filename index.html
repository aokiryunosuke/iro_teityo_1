<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>いろ・啼鳥 第一号</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255, 255, 255, 0.68);
      --panel: rgba(0, 0, 0, 0.62);
      --line: rgba(255, 255, 255, 0.22);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body { position: fixed; inset: 0; touch-action: none; }
    #viewer {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #spread {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: visible;
      transform-origin: center center;
      will-change: transform;
    }
    .page {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
      box-shadow: none;
    }
    .page.empty { width: 0 !important; height: 0 !important; background: transparent; }
    canvas { display: block; width: 100%; height: auto; }
    #controls {
      position: fixed;
      left: 50%;
      bottom: calc(8px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      color: #fff;
      max-width: calc(100vw - 12px);
    }
    button {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 999px;
      height: 34px;
      min-width: 34px;
      padding: 0 10px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
    }
    button:disabled { opacity: 0.25; cursor: default; }
    #pageInfo {
      min-width: 78px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .tap-zone {
      position: fixed;
      top: 0;
      bottom: 0;
      z-index: 10;
      width: 30vw;
      border: 0;
      background: transparent;
      padding: 0;
      opacity: 0;
    }
    #nextZone { left: 0; }
    #prevZone { right: 0; }
    #status {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      line-height: 1.8;
      text-align: center;
      background: #000;
      z-index: 30;
    }
    #status.error { color: #ffd1d1; }
    @media (max-width: 820px) {
      #controls { bottom: calc(6px + env(safe-area-inset-bottom)); gap: 4px; padding: 4px; }
      button { height: 31px; min-width: 31px; padding: 0 8px; font-size: 12px; }
      #pageInfo { min-width: 68px; font-size: 12px; }
    }
    @media (max-width: 380px) {
      button { min-width: 29px; height: 29px; padding: 0 7px; font-size: 11px; }
      #pageInfo { min-width: 60px; }
    }
  </style>
</head>
<body>
  <div id="viewer" aria-label="PDF viewer">
    <div id="spread">
      <div class="page" id="leftPage"></div>
      <div class="page" id="rightPage"></div>
    </div>
  </div>
  <button class="tap-zone" id="nextZone" aria-label="次へ"></button>
  <button class="tap-zone" id="prevZone" aria-label="前へ"></button>
  <div id="controls">
    <button id="nextBtn" aria-label="次へ">←</button>
    <span id="pageInfo">...</span>
    <button id="prevBtn" aria-label="前へ">→</button>
    <button id="zoomOutBtn" aria-label="縮小">−</button>
    <button id="zoomResetBtn" aria-label="ズームを戻す">100%</button>
    <button id="zoomInBtn" aria-label="拡大">＋</button>
  </div>
  <div id="status">読み込み中...</div>
  <script>
    const PDF_URL = './issue01.pdf';
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const statusEl = document.getElementById('status');
    const viewerEl = document.getElementById('viewer');
    const spreadEl = document.getElementById('spread');
    const leftPageEl = document.getElementById('leftPage');
    const rightPageEl = document.getElementById('rightPage');
    const pageInfoEl = document.getElementById('pageInfo');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextZone = document.getElementById('nextZone');
    const prevZone = document.getElementById('prevZone');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomResetBtn = document.getElementById('zoomResetBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');

    let pdfDoc = null;
    let totalPages = 0;
    let currentPage = 1;
    let zoom = 1;
    let panX = 0;
    let panY = 0;
    let rendering = false;
    let rerenderQueued = false;

    function clamp(number, min, max) { return Math.max(min, Math.min(max, number)); }

    function normalizePage(page) {
      page = clamp(page, 1, totalPages);
      if (page === 1) return 1;
      return page % 2 === 0 ? page : page - 1;
    }

    function visiblePages() {
      if (currentPage === 1) return [1];
      if (currentPage + 1 <= totalPages) return [currentPage + 1, currentPage];
      return [currentPage];
    }

    function lastStartPage() {
      if (totalPages <= 1) return 1;
      return totalPages % 2 === 0 ? totalPages : totalPages - 1;
    }

    function updateUi() {
      const pages = visiblePages();
      pageInfoEl.textContent = pages.length === 1
        ? `${pages[0]}/${totalPages}`
        : `${pages[0]}-${pages[1]}/${totalPages}`;
      const isLast = currentPage >= lastStartPage();
      const isFirst = currentPage <= 1;
      nextBtn.disabled = isLast;
      nextZone.disabled = isLast;
      prevBtn.disabled = isFirst;
      prevZone.disabled = isFirst;
      zoomResetBtn.textContent = `${Math.round(zoom * 100)}%`;
    }

    function applyTransform() {
      spreadEl.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      zoomResetBtn.textContent = `${Math.round(zoom * 100)}%`;
    }

    function clearPage(element) {
      element.innerHTML = '';
      element.classList.add('empty');
      element.style.width = '0px';
      element.style.height = '0px';
    }

    function getRenderScaleLimit() {
      const dpr = window.devicePixelRatio || 1;
      // スマホ画質優先版。落ちる場合だけ 3.0 を 2.4 に下げてください。
      if (window.innerWidth <= 900) return Math.min(dpr, 3.0);
      return Math.min(dpr, 3.0);
    }

    async function drawPage(pageNumber, element, maxWidth, maxHeight) {
      element.innerHTML = '';
      element.classList.remove('empty');
      const page = await pdfDoc.getPage(pageNumber);
      const baseViewport = page.getViewport({ scale: 1 });
      const fitScale = Math.min(maxWidth / baseViewport.width, maxHeight / baseViewport.height);
      const viewport = page.getViewport({ scale: fitScale });
      const renderScale = getRenderScaleLimit();
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { alpha: false });
      canvas.width = Math.floor(viewport.width * renderScale);
      canvas.height = Math.floor(viewport.height * renderScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;
      element.style.width = `${Math.floor(viewport.width)}px`;
      element.style.height = `${Math.floor(viewport.height)}px`;
      context.setTransform(renderScale, 0, 0, renderScale, 0, 0);
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = 'high';
      element.appendChild(canvas);
      await page.render({ canvasContext: context, viewport }).promise;
    }

    async function render() {
      if (!pdfDoc) return;
      if (rendering) { rerenderQueued = true; return; }
      rendering = true;
      rerenderQueued = false;
      currentPage = normalizePage(currentPage);
      updateUi();
      panX = 0;
      panY = 0;
      applyTransform();
      const pages = visiblePages();
      const viewerWidth = viewerEl.clientWidth;
      const viewerHeight = viewerEl.clientHeight;
      const controlSpace = window.innerWidth <= 900 ? 36 : 46;
      const maxHeight = Math.max(160, viewerHeight - controlSpace);
      try {
        if (pages.length === 1) {
          const singlePageWidth = viewerWidth / 2;
          if (pages[0] === 1) {
            clearPage(leftPageEl);
            await drawPage(pages[0], rightPageEl, singlePageWidth, maxHeight);
          } else {
            await drawPage(pages[0], leftPageEl, singlePageWidth, maxHeight);
            clearPage(rightPageEl);
          }
        } else {
          const maxPageWidth = viewerWidth / 2;
          await drawPage(pages[0], leftPageEl, maxPageWidth, maxHeight);
          await drawPage(pages[1], rightPageEl, maxPageWidth, maxHeight);
        }
        statusEl.style.display = 'none';
      } catch (error) {
        if (String(error?.name) !== 'RenderingCancelledException') showError(error);
      }
      rendering = false;
      if (rerenderQueued) render();
    }

    function next() {
      if (currentPage >= lastStartPage()) return;
      currentPage = currentPage === 1 ? 2 : currentPage + 2;
      render();
    }

    function prev() {
      if (currentPage <= 1) return;
      currentPage = currentPage <= 2 ? 1 : currentPage - 2;
      render();
    }

    function setZoom(value) {
      zoom = clamp(value, 1, 3.2);
      if (zoom <= 1.01) { panX = 0; panY = 0; }
      updateUi();
      applyTransform();
    }

    function showError(error) {
      statusEl.style.display = 'grid';
      statusEl.className = 'error';
      statusEl.innerHTML =
        `PDFを読み込めませんでした。<br>` +
        `index.html と同じ場所に issue01.pdf があるか確認してください。<br><br>` +
        `${String(error.message || error)}`;
    }

    nextBtn.addEventListener('click', next);
    nextZone.addEventListener('click', () => { if (zoom <= 1.01) next(); });
    prevBtn.addEventListener('click', prev);
    prevZone.addEventListener('click', () => { if (zoom <= 1.01) prev(); });
    zoomOutBtn.addEventListener('click', () => setZoom(zoom - 0.15));
    zoomInBtn.addEventListener('click', () => setZoom(zoom + 0.15));
    zoomResetBtn.addEventListener('click', () => { zoom = 1; panX = 0; panY = 0; updateUi(); applyTransform(); });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') next();
      if (event.key === 'ArrowRight') prev();
      if (event.key === '+') setZoom(zoom + 0.15);
      if (event.key === '-') setZoom(zoom - 0.15);
    });

    let touchStartX = 0;
    let touchStartY = 0;
    let touchLastX = 0;
    let touchLastY = 0;
    let isDragging = false;
    let didDrag = false;
    let pinchStartDistance = 0;
    let pinchStartZoom = 1;

    function getDistance(touchA, touchB) {
      const dx = touchA.clientX - touchB.clientX;
      const dy = touchA.clientY - touchB.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    window.addEventListener('touchstart', (event) => {
      if (event.touches.length === 2) {
        pinchStartDistance = getDistance(event.touches[0], event.touches[1]);
        pinchStartZoom = zoom;
        isDragging = false;
        didDrag = true;
        return;
      }
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      touchLastX = touch.clientX;
      touchLastY = touch.clientY;
      isDragging = zoom > 1.01;
      didDrag = false;
    }, { passive: false });

    window.addEventListener('touchmove', (event) => {
      if (event.touches.length === 2) {
        event.preventDefault();
        const distance = getDistance(event.touches[0], event.touches[1]);
        if (pinchStartDistance > 0) {
          zoom = clamp(pinchStartZoom * (distance / pinchStartDistance), 1, 3.2);
          if (zoom <= 1.01) { panX = 0; panY = 0; }
          updateUi();
          applyTransform();
        }
        return;
      }
      if (event.touches.length === 1 && isDragging) {
        event.preventDefault();
        const touch = event.touches[0];
        panX += touch.clientX - touchLastX;
        panY += touch.clientY - touchLastY;
        touchLastX = touch.clientX;
        touchLastY = touch.clientY;
        didDrag = true;
        applyTransform();
      }
    }, { passive: false });

    window.addEventListener('touchend', (event) => {
      if (event.touches.length > 0) return;
      if (didDrag && zoom > 1.01) return;
      const touch = event.changedTouches[0];
      const diffX = touch.clientX - touchStartX;
      const diffY = touch.clientY - touchStartY;
      if (Math.abs(diffX) < 45) return;
      if (Math.abs(diffY) > 90) return;
      if (diffX < 0) next();
      else prev();
    }, { passive: false });

    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { panX = 0; panY = 0; render(); }, 150);
    });

    async function init() {
      try {
        const loadingTask = pdfjsLib.getDocument({
          url: PDF_URL,
          disableAutoFetch: false,
          disableStream: false,
          disableRange: false
        });
        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;
        currentPage = 1;
        render();
      } catch (error) {
        showError(error);
      }
    }

    init();
  </script>
</body>
</html>
