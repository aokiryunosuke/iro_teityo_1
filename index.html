<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>いろ・啼鳥 第一号</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255, 255, 255, .66);
      --panel: rgba(0, 0, 0, .68);
      --line: rgba(255, 255, 255, .24);
      --button: rgba(255, 255, 255, .10);
      --button-active: rgba(255, 255, 255, .28);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: none;
    }

    #viewer {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #spread {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: visible;
      transform-origin: center center;
      will-change: transform;
    }

    .page {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
      box-shadow: none;
    }

    .page.empty {
      width: 0 !important;
      height: 0 !important;
      background: transparent;
    }

    /*
      スマホの見開き中央に出る細い白線対策。
      canvasの小数px丸めで生まれる1pxの隙間を、右ページを少し重ねて消す。
    */
    .page + .page:not(.empty) {
      margin-left: -1px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
    }

    #controls {
      position: fixed;
      left: 50%;
      bottom: calc(8px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      color: #fff;
      max-width: calc(100vw - 12px);
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--button);
      color: #fff;
      border-radius: 999px;
      height: 34px;
      min-width: 34px;
      padding: 0 10px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
    }

    button:disabled {
      opacity: .25;
      cursor: default;
    }

    button.active {
      background: var(--button-active);
      font-weight: 700;
    }

    #pageInfo {
      min-width: 80px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .tap-zone {
      position: fixed;
      top: 0;
      bottom: 70px;
      z-index: 10;
      width: 28vw;
      border: 0;
      background: transparent;
      padding: 0;
      opacity: 0;
    }

    #nextZone { left: 0; }
    #prevZone { right: 0; }

    #jumpPanel {
      position: fixed;
      left: 50%;
      bottom: calc(58px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 21;
      width: min(560px, calc(100vw - 20px));
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      display: none;
      gap: 10px;
      align-items: center;
    }

    #jumpPanel.open {
      display: flex;
    }

    /*
      左側が100、右側が1になるようにする。
    */
    #pageSlider {
      flex: 1;
      min-width: 120px;
      accent-color: #fff;
      direction: rtl;
    }

    #pageInput {
      width: 72px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.10);
      color: #fff;
      text-align: center;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }

    #status {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      line-height: 1.8;
      text-align: center;
      background: #000;
      z-index: 30;
    }

    #status.error {
      color: #ffd1d1;
    }

    @media (max-width: 820px) {
      #controls {
        bottom: calc(6px + env(safe-area-inset-bottom));
        gap: 4px;
        padding: 4px;
      }

      button {
        height: 31px;
        min-width: 31px;
        padding: 0 8px;
        font-size: 12px;
      }

      #pageInfo {
        min-width: 66px;
        font-size: 12px;
      }

      .tap-zone {
        bottom: 62px;
        width: 24vw;
      }

      #jumpPanel {
        bottom: calc(52px + env(safe-area-inset-bottom));
        padding: 10px;
      }

      #pageInput {
        width: 62px;
        height: 31px;
        font-size: 13px;
      }
    }

    @media (max-width: 430px) {
      #pageInfo {
        min-width: 58px;
      }

      button {
        min-width: 29px;
        height: 29px;
        padding: 0 7px;
        font-size: 11px;
      }

      #controls {
        gap: 3px;
      }

      #zoomResetBtn {
        min-width: 42px;
      }
    }
  </style>
</head>

<body>
  <div id="viewer" aria-label="PDF viewer">
    <div id="spread">
      <div class="page" id="leftPage"></div>
      <div class="page" id="rightPage"></div>
    </div>
  </div>

  <button class="tap-zone" id="nextZone" aria-label="次へ"></button>
  <button class="tap-zone" id="prevZone" aria-label="前へ"></button>

  <div id="jumpPanel">
    <input id="pageSlider" type="range" min="1" max="1" value="1" />
    <input id="pageInput" type="number" min="1" max="1" value="1" inputmode="numeric" />
  </div>

  <div id="controls">
    <button id="nextBtn" aria-label="次へ">←</button>
    <span id="pageInfo">...</span>
    <button id="prevBtn" aria-label="前へ">→</button>
    <button id="spreadBtn" aria-label="見開き">開</button>
    <button id="singleBtn" aria-label="単一ページ">単</button>
    <button id="jumpBtn" aria-label="ページ移動">移</button>
    <button id="zoomOutBtn" aria-label="縮小">−</button>
    <button id="zoomResetBtn" aria-label="ズームを戻す">100%</button>
    <button id="zoomInBtn" aria-label="拡大">＋</button>
  </div>

  <div id="status">読み込み中...</div>

  <script>
    const PDF_URL = './issue01.pdf';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const statusEl = document.getElementById('status');
    const viewerEl = document.getElementById('viewer');
    const spreadEl = document.getElementById('spread');
    const leftPageEl = document.getElementById('leftPage');
    const rightPageEl = document.getElementById('rightPage');
    const pageInfoEl = document.getElementById('pageInfo');

    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextZone = document.getElementById('nextZone');
    const prevZone = document.getElementById('prevZone');

    const singleBtn = document.getElementById('singleBtn');
    const spreadBtn = document.getElementById('spreadBtn');
    const jumpBtn = document.getElementById('jumpBtn');

    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomResetBtn = document.getElementById('zoomResetBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');

    const jumpPanel = document.getElementById('jumpPanel');
    const pageSlider = document.getElementById('pageSlider');
    const pageInput = document.getElementById('pageInput');

    let pdfDoc = null;
    let totalPages = 0;
    let currentPage = 1;

    /*
      スマホは初期状態では単ページ。
      「開」で見開きにできます。
    */
    let viewMode = window.innerWidth <= 820 ? 'single' : 'spread';

    let zoom = 1;
    let panX = 0;
    let panY = 0;

    let rendering = false;
    let rerenderQueued = false;

    function clamp(number, min, max) {
      return Math.max(min, Math.min(max, number));
    }

    function normalizePage(page) {
      page = clamp(page, 1, totalPages);

      if (viewMode === 'single') {
        return page;
      }

      if (page === 1) {
        return 1;
      }

      return page % 2 === 0 ? page : page - 1;
    }

    function visiblePages() {
      if (viewMode === 'single') {
        return [currentPage];
      }

      if (currentPage === 1) {
        return [1];
      }

      if (currentPage + 1 <= totalPages) {
        /*
          右開きなので 3-2, 5-4。
        */
        return [currentPage + 1, currentPage];
      }

      return [currentPage];
    }

    function lastStartPage() {
      if (viewMode === 'single') {
        return totalPages;
      }

      if (totalPages <= 1) {
        return 1;
      }

      return totalPages % 2 === 0 ? totalPages : totalPages - 1;
    }

    function getDisplayStartPage() {
      const pages = visiblePages();
      if (pages.length === 1) return pages[0];
      return Math.min(...pages);
    }

    function updateUi() {
      const pages = visiblePages();

      if (pages.length === 1) {
        pageInfoEl.textContent = `${pages[0]}/${totalPages}`;
      } else {
        pageInfoEl.textContent = `${pages[0]}-${pages[1]}/${totalPages}`;
      }

      const isLast = currentPage >= lastStartPage();
      const isFirst = currentPage <= 1;

      nextBtn.disabled = isLast;
      nextZone.disabled = isLast;

      prevBtn.disabled = isFirst;
      prevZone.disabled = isFirst;

      singleBtn.classList.toggle('active', viewMode === 'single');
      spreadBtn.classList.toggle('active', viewMode === 'spread');

      zoomResetBtn.textContent = `${Math.round(zoom * 100)}%`;

      pageSlider.max = totalPages || 1;
      pageInput.max = totalPages || 1;

      const start = getDisplayStartPage();
      pageSlider.value = start;
      pageInput.value = start;
    }

    function clampPan() {
      if (zoom <= 1.01) {
        panX = 0;
        panY = 0;
        return;
      }

      /*
        拡大中にページが画面外へ飛びすぎるのを防ぐ。
        完全な境界計算より、読書ビューではこのくらいのゆるい制限が扱いやすい。
      */
      const maxX = viewerEl.clientWidth * (zoom - 1) * 0.65 + 80;
      const maxY = viewerEl.clientHeight * (zoom - 1) * 0.65 + 80;

      panX = clamp(panX, -maxX, maxX);
      panY = clamp(panY, -maxY, maxY);
    }

    function applyTransform() {
      clampPan();
      spreadEl.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      zoomResetBtn.textContent = `${Math.round(zoom * 100)}%`;
    }

    function resetPanIfNeeded() {
      if (zoom <= 1.01) {
        panX = 0;
        panY = 0;
      }
    }

    function resetViewTransform() {
      panX = 0;
      panY = 0;
      applyTransform();
    }

    function clearPage(element) {
      element.innerHTML = '';
      element.classList.add('empty');
      element.style.width = '0px';
      element.style.height = '0px';
    }

    function getRenderScaleLimit(viewportWidth, viewportHeight) {
      /*
        スマホ見開きの画質を優先。
        DPRより高い内部解像度で描画するので、見開きでも文字が潰れにくくなります。

        ただし巨大canvasで落ちないように、1ページあたりの最大ピクセル数で制限します。
      */
      let desiredScale;

      if (window.innerWidth <= 900) {
        desiredScale = viewMode === 'spread' ? 4.6 : 4.0;
      } else {
        desiredScale = 3.2;
      }

      const maxPixelsPerPage = window.innerWidth <= 900 ? 9000000 : 12000000;
      const estimatedPixelsAtDesired =
        viewportWidth * viewportHeight * desiredScale * desiredScale;

      if (estimatedPixelsAtDesired <= maxPixelsPerPage) {
        return desiredScale;
      }

      return Math.max(
        2.2,
        Math.sqrt(maxPixelsPerPage / (viewportWidth * viewportHeight))
      );
    }

    async function drawPage(pageNumber, element, maxWidth, maxHeight) {
      element.innerHTML = '';
      element.classList.remove('empty');

      const page = await pdfDoc.getPage(pageNumber);
      const baseViewport = page.getViewport({ scale: 1 });

      const fitScale = Math.min(
        maxWidth / baseViewport.width,
        maxHeight / baseViewport.height
      );

      const viewport = page.getViewport({ scale: fitScale });
      const renderScale = getRenderScaleLimit(viewport.width, viewport.height);

      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d', { alpha: false });

      canvas.width = Math.floor(viewport.width * renderScale);
      canvas.height = Math.floor(viewport.height * renderScale);

      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      element.style.width = `${Math.floor(viewport.width)}px`;
      element.style.height = `${Math.floor(viewport.height)}px`;

      context.setTransform(renderScale, 0, 0, renderScale, 0, 0);
      context.imageSmoothingEnabled = true;
      context.imageSmoothingQuality = 'high';

      element.appendChild(canvas);

      await page.render({
        canvasContext: context,
        viewport
      }).promise;
    }

    async function render() {
      if (!pdfDoc) return;

      if (rendering) {
        rerenderQueued = true;
        return;
      }

      rendering = true;
      rerenderQueued = false;

      currentPage = normalizePage(currentPage);
      updateUi();
      resetViewTransform();

      const pages = visiblePages();

      const viewerWidth = viewerEl.clientWidth;
      const viewerHeight = viewerEl.clientHeight;

      const controlSpace = window.innerWidth <= 900 ? 38 : 48;
      const maxHeight = Math.max(160, viewerHeight - controlSpace);

      try {
        if (viewMode === 'single') {
          /*
            単ページは画面いっぱいに近く表示。
          */
          await drawPage(pages[0], leftPageEl, viewerWidth, maxHeight);
          clearPage(rightPageEl);
        } else if (pages.length === 1) {
          /*
            見開きモードの単独ページは、他のページ1枚分と同じ大きさ。
          */
          const singlePageWidth = viewerWidth / 2;

          if (pages[0] === 1) {
            clearPage(leftPageEl);
            await drawPage(pages[0], rightPageEl, singlePageWidth, maxHeight);
          } else {
            await drawPage(pages[0], leftPageEl, singlePageWidth, maxHeight);
            clearPage(rightPageEl);
          }
        } else {
          /*
            見開きは 3-2, 5-4 の順。
          */
          const maxPageWidth = viewerWidth / 2;

          await drawPage(pages[0], leftPageEl, maxPageWidth, maxHeight);
          await drawPage(pages[1], rightPageEl, maxPageWidth, maxHeight);
        }

        statusEl.style.display = 'none';
      } catch (error) {
        if (String(error?.name) !== 'RenderingCancelledException') {
          showError(error);
        }
      }

      rendering = false;

      if (rerenderQueued) render();
    }

    function next() {
      if (currentPage >= lastStartPage()) return;

      if (viewMode === 'single') {
        currentPage += 1;
      } else {
        currentPage = currentPage === 1 ? 2 : currentPage + 2;
      }

      render();
    }

    function prev() {
      if (currentPage <= 1) return;

      if (viewMode === 'single') {
        currentPage -= 1;
      } else {
        currentPage = currentPage <= 2 ? 1 : currentPage - 2;
      }

      render();
    }

    function setViewMode(mode) {
      const oldStart = getDisplayStartPage();
      viewMode = mode;
      currentPage = normalizePage(oldStart);
      render();
    }

    function goToPage(pageNumber) {
      currentPage = normalizePage(Number(pageNumber) || 1);
      render();
    }

    function setZoom(value) {
      zoom = clamp(value, 1, 4.0);
      resetPanIfNeeded();
      updateUi();
      applyTransform();
    }

    function showError(error) {
      statusEl.style.display = 'grid';
      statusEl.className = 'error';
      statusEl.innerHTML =
        `PDFを読み込めませんでした。<br>` +
        `index.html と同じ場所に issue01.pdf があるか確認してください。<br><br>` +
        `${String(error.message || error)}`;
    }

    nextBtn.addEventListener('click', next);
    nextZone.addEventListener('click', next);

    prevBtn.addEventListener('click', prev);
    prevZone.addEventListener('click', prev);

    spreadBtn.addEventListener('click', () => setViewMode('spread'));
    singleBtn.addEventListener('click', () => setViewMode('single'));

    jumpBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      jumpPanel.classList.toggle('open');
    });

    /*
      移動バーは、パネル外を押したら閉じる。
      パネル内のスライダーや入力欄を触った場合は閉じない。
    */
    jumpPanel.addEventListener('pointerdown', (event) => {
      event.stopPropagation();
    });

    document.addEventListener('pointerdown', (event) => {
      if (!jumpPanel.classList.contains('open')) return;
      if (jumpPanel.contains(event.target)) return;
      if (jumpBtn.contains(event.target)) return;
      jumpPanel.classList.remove('open');
    });

    /*
      スライダーを動かしている最中にもページを変える。
      ただし毎フレームPDFを描画するとスマホで重いので、
      少しだけ間隔をあけて反映します。
    */
    let sliderRenderTimer = null;

    pageSlider.addEventListener('input', () => {
      pageInput.value = pageSlider.value;

      clearTimeout(sliderRenderTimer);
      sliderRenderTimer = setTimeout(() => {
        goToPage(pageSlider.value);
      }, 120);
    });

    pageSlider.addEventListener('change', () => {
      clearTimeout(sliderRenderTimer);
      goToPage(pageSlider.value);
    });

    pageInput.addEventListener('change', () => {
      goToPage(pageInput.value);
    });

    pageInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        goToPage(pageInput.value);
        jumpPanel.classList.remove('open');
      }
    });

    zoomOutBtn.addEventListener('click', () => setZoom(zoom - 0.15));
    zoomInBtn.addEventListener('click', () => setZoom(zoom + 0.15));

    zoomResetBtn.addEventListener('click', () => {
      zoom = 1;
      panX = 0;
      panY = 0;
      updateUi();
      applyTransform();
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') next();
      if (event.key === 'ArrowRight') prev();

      if (event.key === '+') setZoom(zoom + 0.15);
      if (event.key === '-') setZoom(zoom - 0.15);

      if (event.key.toLowerCase() === 'j') {
        jumpPanel.classList.toggle('open');
      }

      if (event.key === 'Escape') {
        jumpPanel.classList.remove('open');
      }
    });

    /*
      スマホ操作
      - 1本指左右スワイプ：ページ移動
      - 拡大中の1本指ドラッグ：位置移動
      - 2本指ピンチ：拡大縮小
    */
    let touchStartX = 0;
    let touchStartY = 0;
    let touchLastX = 0;
    let touchLastY = 0;
    let lastTapTime = 0;

    let isDragging = false;
    let didDrag = false;

    let pinchStartDistance = 0;
    let pinchStartZoom = 1;

    function getDistance(touchA, touchB) {
      const dx = touchA.clientX - touchB.clientX;
      const dy = touchA.clientY - touchB.clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    window.addEventListener('touchstart', (event) => {
      if (event.touches.length === 2) {
        pinchStartDistance = getDistance(event.touches[0], event.touches[1]);
        pinchStartZoom = zoom;
        isDragging = false;
        didDrag = true;
        return;
      }

      const touch = event.changedTouches[0];

      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      touchLastX = touch.clientX;
      touchLastY = touch.clientY;

      isDragging = zoom > 1.01;
      didDrag = false;
    }, { passive: false });

    window.addEventListener('touchmove', (event) => {
      if (event.touches.length === 2) {
        event.preventDefault();

        const distance = getDistance(event.touches[0], event.touches[1]);

        if (pinchStartDistance > 0) {
          zoom = clamp(pinchStartZoom * (distance / pinchStartDistance), 1, 4.0);
          resetPanIfNeeded();
          updateUi();
          applyTransform();
        }

        return;
      }

      if (event.touches.length === 1 && isDragging) {
        event.preventDefault();

        const touch = event.touches[0];
        const dx = touch.clientX - touchLastX;
        const dy = touch.clientY - touchLastY;

        panX += dx;
        panY += dy;

        touchLastX = touch.clientX;
        touchLastY = touch.clientY;

        didDrag = true;
        applyTransform();
      }
    }, { passive: false });

    window.addEventListener('touchend', (event) => {
      if (event.touches.length > 0) return;

      const touch = event.changedTouches[0];
      const diffX = touch.clientX - touchStartX;
      const diffY = touch.clientY - touchStartY;

      /*
        ダブルタップで拡大状態を完全リセット。
        変な位置まで拡大・移動してしまった時の保険です。
      */
      const now = Date.now();
      if (Math.abs(diffX) < 12 && Math.abs(diffY) < 12) {
        if (now - lastTapTime < 320) {
          zoom = 1;
          panX = 0;
          panY = 0;
          updateUi();
          applyTransform();
          lastTapTime = 0;
          return;
        }
        lastTapTime = now;
      }

      if (didDrag && zoom > 1.01) return;

      if (Math.abs(diffX) < 45) return;
      if (Math.abs(diffY) > 90) return;

      if (diffX < 0) next();
      else prev();
    }, { passive: false });

    let resizeTimer = null;

    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(() => {
        panX = 0;
        panY = 0;
        render();
      }, 150);
    });

    async function init() {
      try {
        const loadingTask = pdfjsLib.getDocument({
          url: PDF_URL,
          disableAutoFetch: false,
          disableStream: false,
          disableRange: false
        });

        pdfDoc = await loadingTask.promise;
        totalPages = pdfDoc.numPages;
        currentPage = 1;

        updateUi();
        render();
      } catch (error) {
        showError(error);
      }
    }

    init();
  </script>
</body>
</html>
